<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* FULLSCREEN — hide browser chrome when installed as PWA or in standalone */
html{height:100%;height:-webkit-fill-available}
body{
  min-height:100vh;min-height:-webkit-fill-available;
  position:fixed;width:100%;overflow:hidden;
}

/* ══════════════════════════════
   THEME TOKENS
   Light themes: white canvas, soft tint washes, high-contrast dark text
   Dark themes: near-black base, deep glass, light text
══════════════════════════════ */

html,body{
  height:100%;width:100%;overflow:hidden;
  background:var(--bg);color:var(--text);
  font-family:'Geist',sans-serif;-webkit-font-smoothing:antialiased;
  transition:background 0.45s,color 0.45s;
  overscroll-behavior:none;
}

/* ── ANIMATED BG ── */
.bg-wrap{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bg-base{position:absolute;inset:0;background:var(--bg);transition:background 0.45s}
.bg-orbs{position:absolute;inset:0;transition:opacity 0.45s}
.bg-orbs::before{content:'';position:absolute;inset:0;background:var(--orb-a),var(--orb-b),var(--orb-c)}
/* gentle float — light themes do subtle scale, dark do translate */
.bg-orbs{animation:orbFloat 12s ease-in-out infinite}
@keyframes orbFloat{0%,100%{transform:scale(1)}50%{transform:scale(1.04) translateY(-12px)}}
.bg-photo{position:absolute;inset:0;background-size:cover;background-position:center;opacity:0;transition:opacity 0.6s}
.bg-photo.show{opacity:1}
/* scrim over bg photo — light themes lighter, dark darker */
.bg-scrim{position:absolute;inset:0;
  background:linear-gradient(to bottom,
    rgba(var(--scrim-rgb,255,255,255),calc(var(--is-dark)*0 + (1 - var(--is-dark))*0.35)),
    transparent 40%,
    rgba(var(--scrim-rgb,255,255,255),calc(var(--is-dark)*0 + (1 - var(--is-dark))*0.20))
  );
  mix-blend-mode:normal;
}
/* dark theme overlay */
.bg-dark-overlay{position:absolute;inset:0;background:rgba(0,0,0,calc(var(--is-dark)*0.38));transition:background 0.45s}

/* ── SCREENS ── */
.screen{position:fixed;inset:0;display:flex;flex-direction:column;z-index:1;
  transition:opacity 0.30s cubic-bezier(.4,0,.2,1),transform 0.30s cubic-bezier(.4,0,.2,1)}
.screen.off{opacity:0;pointer-events:none;transform:scale(0.97) translateY(12px)}

/* ═══════════════════ SETUP ═══════════════════ */
#setup{align-items:center;justify-content:center}
.setup-inner{
  display:flex;flex-direction:column;align-items:center;gap:44px;
  padding:40px 28px;width:100%;max-width:380px;
}

.logo{text-align:center;animation:logoIn 0.85s cubic-bezier(.2,1.4,.4,1) both 0.1s}
@keyframes logoIn{from{opacity:0;transform:translateY(22px) scale(0.9)}to{opacity:1;transform:none}}
.logo h1{
  font-family:'DM Serif Display',serif;font-style:italic;
  font-size:68px;line-height:1;letter-spacing:-2px;color:var(--accent);
}
.logo p{margin-top:8px;font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--text3);font-weight:300}

.user-cards{display:flex;flex-direction:column;gap:12px;width:100%}
.ucard{
  display:flex;align-items:center;gap:16px;
  padding:20px 22px;border-radius:22px;cursor:pointer;
  background:var(--glass);
  backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
  border:1px solid var(--border);
  box-shadow:0 2px 16px var(--shadow2),0 8px 32px var(--shadow);
  transition:transform 0.22s cubic-bezier(.2,1.4,.4,1),box-shadow 0.22s,border-color 0.2s;
  animation:cardIn 0.55s cubic-bezier(.2,1.4,.4,1) both;
  position:relative;overflow:hidden;
}
.ucard:nth-child(1){animation-delay:0.22s}.ucard:nth-child(2){animation-delay:0.36s}
@keyframes cardIn{from{opacity:0;transform:translateY(20px) scale(0.94)}to{opacity:1;transform:none}}
.ucard::after{content:'';position:absolute;inset:0;background:linear-gradient(110deg,transparent 38%,rgba(255,255,255,0.10) 50%,transparent 62%);transform:translateX(-100%);transition:transform 0.5s}
.ucard:hover{transform:translateY(-2px) scale(1.01);border-color:var(--border2);box-shadow:0 4px 24px var(--shadow),0 1px 0 var(--border2)}
.ucard:hover::after{transform:translateX(100%)}
.ucard:active{transform:scale(0.96)}

.uav{
  width:46px;height:46px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-family:'DM Serif Display',serif;font-size:18px;
  background:rgba(var(--accent-rgb),0.12);
  color:var(--accent);border:1.5px solid rgba(var(--accent-rgb),0.22);
}
.uinfo h3{font-size:16px;font-weight:500;color:var(--text);line-height:1.2}
.uinfo p{font-size:12px;color:var(--text2);margin-top:3px;font-style:italic}
.uarr{margin-left:auto;font-size:20px;color:var(--text3);transition:transform 0.2s,color 0.2s;flex-shrink:0}
.ucard:hover .uarr{transform:translateX(4px);color:var(--accent)}

/* ═══════════════════ CHAT ═══════════════════ */
#chat{background:transparent}

/* HEADER */
.hdr{
  display:flex;align-items:center;gap:13px;
  padding:12px 16px;
  padding-top:calc(12px + env(safe-area-inset-top,0px));
  background:var(--header-bg);
  backdrop-filter:blur(26px);-webkit-backdrop-filter:blur(26px);
  border-bottom:1px solid var(--border);
  flex-shrink:0;z-index:10;position:relative;
}
.hdr-av{
  width:38px;height:38px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-family:'DM Serif Display',serif;font-size:15px;
  background:rgba(var(--accent-rgb),0.12);
  color:var(--accent);border:1.5px solid rgba(var(--accent-rgb),0.20);
}
.hdr-info{flex:1;min-width:0;overflow:hidden}
.hdr-name{font-size:15px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-st{
  display:flex;align-items:center;gap:5px;margin-top:2px;
  font-size:11px;color:var(--text2);transition:color 0.2s;
}
.hdr-st.typing-now{color:var(--accent)}
.st-dot{
  width:6px;height:6px;border-radius:50%;flex-shrink:0;
  background:var(--text3);transition:background 0.3s;
}
.st-dot.live{background:#4ade80;box-shadow:0 0 5px rgba(74,222,128,0.6);animation:dotblink 2.2s ease infinite}
@keyframes dotblink{0%,100%{opacity:1}50%{opacity:0.45}}
.hdr-st.typing-now .st-dot{background:var(--accent);animation:dotpulse 1s ease infinite}
@keyframes dotpulse{0%,100%{opacity:1}50%{opacity:0.35}}

.hdr-btn{
  width:36px;height:36px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;cursor:pointer;
  background:var(--glass2);
  border:1px solid var(--border);
  color:var(--text2);
  transition:all 0.18s;
  /* big touch target */
}
.hdr-btn:active{transform:scale(0.88);background:var(--glass3)}

/* MESSAGES */
.msgs{
  flex:1;overflow-y:auto;
  padding:16px 13px 12px;
  display:flex;flex-direction:column;gap:2px;
  -webkit-overflow-scrolling:touch;
}
.msgs::-webkit-scrollbar{display:none}

.datediv{
  text-align:center;margin:12px 0 5px;
  font-size:10px;letter-spacing:1px;text-transform:uppercase;
  color:var(--text3);display:flex;align-items:center;gap:8px;
}
.datediv::before,.datediv::after{content:'';flex:1;height:1px;background:var(--border)}

/* BUBBLES */
@keyframes msgpop{from{opacity:0;transform:translateY(10px) scale(0.95)}to{opacity:1;transform:none}}
.mw.me{align-self:flex-end;align-items:flex-end}
.mw.her{align-self:flex-start;align-items:flex-start}

.rprev{
  font-size:11.5px;color:var(--text2);
  background:var(--glass2);backdrop-filter:blur(12px);
  border-left:2.5px solid var(--accent);
  padding:5px 10px;border-radius:9px;margin-bottom:4px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:230px;
}

.bbl{
  padding:10px 14px;border-radius:18px;
  font-size:14.5px;line-height:1.55;word-break:break-word;
  cursor:pointer;
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  transition:transform 0.14s,opacity 0.14s;
  /* min touch target */
  min-height:36px;
}
.bbl:active{transform:scale(0.96);opacity:0.82}
.mw.me .bbl{
  background:var(--me-bubble);border:1px solid var(--me-border);
  border-bottom-right-radius:5px;
}
.mw.her .bbl{
  background:var(--her-bubble);border:1px solid var(--her-border);
  border-bottom-left-radius:5px;
}
/* light theme her bubbles need solid shadow to lift off bg */
.mw.her .bbl{box-shadow:0 1px 8px var(--shadow2)}

.bbl img{
  max-width:min(220px,60vw);max-height:260px;
  border-radius:12px;display:block;object-fit:cover;
}

.mmeta{display:flex;align-items:center;gap:4px;margin-top:3px;padding:0 3px}
.mtime{font-size:10px;color:var(--text3)}
.ticks{font-size:11px;color:var(--text3);transition:color 0.35s}
.ticks.seen{color:var(--accent)}

.rxrow{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
.rxchip{
  background:var(--glass2);backdrop-filter:blur(10px);
  border:1px solid var(--border);border-radius:20px;
  padding:3px 9px;font-size:12px;cursor:pointer;
  transition:transform 0.15s cubic-bezier(.2,1.4,.4,1);
  color:var(--text);
}
.rxchip:active{transform:scale(1.28)}

/* SWIPE TO REPLY */
.mw{
  display:flex;flex-direction:column;
  max-width:78%;
  animation:msgpop 0.22s cubic-bezier(.2,1.4,.4,1);
  position:relative;
}
/* the bubble wrapper that slides */
.bbl-wrap{
  position:relative;
  transition:transform 0.18s cubic-bezier(.2,1.4,.4,1);
  will-change:transform;
}
/* reply arrow that fades in on swipe */
.swipe-arrow{
  position:absolute;
  top:50%;transform:translateY(-50%);
  font-size:18px;opacity:0;
  transition:opacity 0.15s;
  pointer-events:none;
  color:var(--accent);
}
.mw.me .swipe-arrow{right:calc(100% + 8px)}
.mw.her .swipe-arrow{left:calc(100% + 8px)}
.swipe-arrow.show{opacity:1}

/* DELETED MESSAGE */
.bbl.deleted{
  opacity:0.55;
  font-style:italic;
  font-size:13px !important;
  color:var(--text2) !important;
  background:var(--glass) !important;
  border-style:dashed !important;
  cursor:default !important;
}
.bbl.deleted::before{content:'🚫  ';font-style:normal;font-size:12px}

/* EMPTY */
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text3)}
.empty .ei{font-size:40px;animation:orbFloat 4s ease-in-out infinite}
.empty p{font-size:13px;font-style:italic}

/* PREVENT BROWSER TEXT SELECTION ON MOBILE */
.bbl,.mw,.bbl-wrap{
  -webkit-user-select:none;
  -webkit-touch-callout:none;
  user-select:none;
}
/* prevent browser context menu on long press */
.bbl{-webkit-tap-highlight-color:transparent}
/* but allow selection inside input */
#minp{-webkit-user-select:text;user-select:text}

/* LINK IN BUBBLE */
.bbl a{color:var(--accent);text-decoration:underline;text-decoration-style:dotted;word-break:break-all}

/* LINK PREVIEW CARD */
.link-card{
  margin-top:8px;border-radius:12px;overflow:hidden;
  border:1px solid var(--border);background:var(--glass2);
  backdrop-filter:blur(12px);cursor:pointer;
  transition:opacity 0.15s;max-width:240px;
}
.link-card:active{opacity:0.75}
.link-card-img{width:100%;height:100px;object-fit:cover;display:block}
.link-card-body{padding:8px 10px}
.link-card-title{font-size:12px;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.link-card-url{font-size:10px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.link-card-placeholder{display:flex;align-items:center;gap:8px;padding:10px}
.link-card-placeholder .lp-icon{font-size:22px;flex-shrink:0}
.link-card-placeholder .lp-url{font-size:11px;color:var(--accent);word-break:break-all}

/* VOICE MESSAGE */
.voice-msg{
  display:flex;align-items:center;gap:10px;
  padding:4px 2px;min-width:160px;
}
.voice-play{
  width:34px;height:34px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  background:var(--accent);color:white;font-size:14px;
  cursor:pointer;border:none;transition:transform 0.15s;
}
.voice-play:active{transform:scale(0.88)}
.voice-waveform{flex:1;height:28px;position:relative;cursor:pointer}
.voice-waveform canvas{width:100%;height:100%}
.voice-dur{font-size:11px;color:var(--text2);flex-shrink:0;min-width:30px;text-align:right}

/* RECORD BTN */
.recbtn{
  width:42px;height:42px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;cursor:pointer;
  background:var(--glass2);border:1px solid var(--border);
  color:var(--text2);transition:all 0.18s;
  position:relative;
}
.recbtn:active,.recbtn.recording{background:rgba(220,50,50,0.15);border-color:rgba(220,50,50,0.4);color:#dc3232}
.recbtn.recording::after{
  content:'';position:absolute;inset:-3px;border-radius:50%;
  border:2px solid rgba(220,50,50,0.5);
  animation:recpulse 1s ease infinite;
}
@keyframes recpulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.15);opacity:0.5}}

/* CTX COPY ITEM */
.ctx-copy{}


/* REPLY BAR */
#rbar{display:none;align-items:center;gap:10px;padding:10px 16px;background:var(--header-bg);backdrop-filter:blur(22px);border-top:1px solid var(--border);animation:slideup 0.18s ease}
#rbar.on{display:flex}
@keyframes slideup{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.rb-in{flex:1;border-left:2.5px solid var(--accent);padding-left:10px}
.rb-lbl{font-size:10px;color:var(--accent);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:2px}
.rb-txt{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rb-x{background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer;padding:6px;min-width:36px;min-height:36px;display:flex;align-items:center;justify-content:center}

/* IMG PREVIEW */
#iprv{display:none;padding:10px 16px 4px;background:var(--header-bg);backdrop-filter:blur(22px)}
#iprv.on{display:flex;align-items:center;gap:12px}
#iprv img{width:54px;height:54px;object-fit:cover;border-radius:11px;border:1px solid var(--border)}
#iprv button{background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer;padding:6px}

/* INPUT AREA */
.inputrow{
  display:flex;align-items:flex-end;gap:9px;
  padding:10px 12px;
  padding-bottom:calc(10px + env(safe-area-inset-bottom,0px));
  background:var(--header-bg);
  backdrop-filter:blur(26px);-webkit-backdrop-filter:blur(26px);
  border-top:1px solid var(--border);flex-shrink:0;
}
.attbtn{
  width:42px;height:42px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;cursor:pointer;
  background:var(--glass2);border:1px solid var(--border);
  color:var(--text2);transition:all 0.18s;
}
.attbtn:active{transform:scale(0.87);background:var(--glass3)}

.inpwrap{
  flex:1;background:var(--input-bg);
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border:1px solid var(--border);border-radius:24px;
  display:flex;align-items:flex-end;padding:10px 14px;
  transition:border-color 0.2s,background 0.2s;
}
.inpwrap:focus-within{border-color:var(--border2);background:var(--glass3)}

#minp{
  flex:1;background:none;border:none;outline:none;
  color:var(--text);font-family:'Geist',sans-serif;
  font-size:15px;line-height:1.4;resize:none;
  max-height:100px;min-height:24px;
}
#minp::placeholder{color:var(--text3)}

.sndbtn{
  width:42px;height:42px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:17px;cursor:pointer;
  background:var(--accent);border:none;color:white;
  transition:all 0.22s cubic-bezier(.2,1.4,.4,1);
  opacity:0.28;transform:scale(0.86);
}
.sndbtn.on{opacity:1;transform:scale(1)}
.sndbtn:active{transform:scale(0.83)}

/* ═══════════════════ SIDE MENU ═══════════════════ */
#overlay{position:fixed;inset:0;z-index:400;display:none;background:rgba(0,0,0,0.22)}
#overlay.on{display:block}

#mpanel{
  position:fixed;top:0;right:0;
  width:min(300px,88vw);height:100%;
  background:var(--menu-bg);
  backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
  border-left:1px solid var(--border);
  z-index:500;display:flex;flex-direction:column;
  transform:translateX(105%);transition:transform 0.28s cubic-bezier(.4,0,.2,1);
  box-shadow:-6px 0 40px var(--shadow);
  padding-top:env(safe-area-inset-top,0px);
}
#mpanel.on{transform:translateX(0)}

.mhdr{
  padding:20px 18px 14px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.mhdr h3{font-family:'DM Serif Display',serif;font-size:22px;font-style:italic;color:var(--text)}
.mhdr-x{background:none;border:none;color:var(--text2);font-size:22px;cursor:pointer;padding:4px;min-width:36px;min-height:36px;display:flex;align-items:center;justify-content:center}

.mbody{flex:1;overflow-y:auto;padding:18px 16px;display:flex;flex-direction:column;gap:28px}
.mbody::-webkit-scrollbar{display:none}

.msec-ttl{
  font-size:10px;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--text3);margin-bottom:12px;padding-left:2px;
}

/* BG upload */
.bguparea{
  border:1.5px dashed var(--border2);border-radius:16px;
  padding:22px 16px;text-align:center;cursor:pointer;
  background:var(--glass);backdrop-filter:blur(12px);
  transition:border-color 0.2s,background 0.2s;
  display:flex;flex-direction:column;align-items:center;gap:8px;
}
.bguparea:active{background:var(--glass2);border-color:var(--accent)}
.bguparea .upico{font-size:30px;opacity:0.6}
.bguparea p{font-size:13px;color:var(--text2);font-weight:500}
.bguparea small{font-size:11px;color:var(--text3)}

.bgprvwrap{position:relative;border-radius:14px;overflow:hidden;margin-top:10px}
.bgprvwrap img{width:100%;height:100px;object-fit:cover;display:block}
.bgprvwrap button{
  position:absolute;top:7px;right:7px;
  background:rgba(0,0,0,0.55);border:none;color:white;
  border-radius:50%;width:26px;height:26px;
  font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;
}

/* Theme grid */
.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.tswatch{
  border-radius:14px;padding:13px 11px;cursor:pointer;
  border:2px solid transparent;
  transition:all 0.18s cubic-bezier(.2,1.4,.4,1);
  position:relative;overflow:hidden;
  min-height:60px;
}
.tswatch:active{transform:scale(0.96)}
.tswatch.cur{border-color:var(--accent)}
.tswatch .sname{font-size:11.5px;font-weight:500;margin-bottom:5px;white-space:nowrap}
.tswatch .sdot{width:11px;height:11px;border-radius:50%}
/* checkmark for selected */
.tswatch.cur::after{
  content:'✓';position:absolute;top:7px;right:9px;
  font-size:11px;font-weight:600;
}

/* ═══════════════════ OVERLAYS ═══════════════════ */
#ctx{
  position:fixed;
  background:var(--menu-bg);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border:1px solid var(--border2);border-radius:16px;padding:6px;
  z-index:410;display:none;flex-direction:column;gap:2px;
  min-width:154px;box-shadow:0 12px 40px var(--shadow);
  animation:menuin 0.17s cubic-bezier(.2,1.4,.4,1);
}
#ctx.on{display:flex}
@keyframes menuin{from{opacity:0;transform:scale(0.9) translateY(6px)}to{opacity:1;transform:none}}
.cxi{
  padding:12px 14px;border-radius:10px;font-size:14px;color:var(--text);
  cursor:pointer;display:flex;align-items:center;gap:10px;
  transition:background 0.1s;min-height:44px;
}
.cxi svg{flex-shrink:0;opacity:0.7}
.cxi:active{background:var(--glass2)}
.cxi.red{color:#e05555}
.cxi.red svg{opacity:1}

#rxnpick{
  position:fixed;
  background:var(--menu-bg);backdrop-filter:blur(24px);
  border:1px solid var(--border2);border-radius:40px;
  padding:8px 10px;display:none;gap:2px;z-index:420;
  box-shadow:0 8px 32px var(--shadow);
  animation:menuin 0.17s cubic-bezier(.2,1.4,.4,1);
  /* will be positioned by JS to never overflow */
  max-width:calc(100vw - 24px);
  flex-wrap:wrap;
}
#rxnpick.on{display:flex}
.rxno{font-size:22px;cursor:pointer;padding:4px;border-radius:50%;transition:transform 0.15s cubic-bezier(.2,1.4,.4,1);width:38px;height:38px;display:flex;align-items:center;justify-content:center}
.rxno:active{transform:scale(1.42)}

/* LEFT SWIPE ACTION STRIP */
.swipe-actions{
  position:absolute;
  top:50%;transform:translateY(-50%);
  display:flex;gap:6px;
  opacity:0;pointer-events:none;
  transition:opacity 0.15s;
}
.mw.me .swipe-actions{right:calc(100% + 8px);flex-direction:row-reverse}
.mw.her .swipe-actions{left:calc(100% + 8px)}
.swipe-actions.show{opacity:1}
.sw-act-btn{
  width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:var(--glass2);border:1px solid var(--border);
  color:var(--accent);
}

/* MULTI-SELECT MODE */
.msgs.selecting .mw{cursor:pointer}
.mw.selected .bbl{
  outline:2px solid var(--accent);
  outline-offset:2px;
}
.mw.selected::before{
  content:'';
  position:absolute;inset:0;
  background:rgba(var(--accent-rgb),0.08);
  border-radius:18px;
  pointer-events:none;
}

/* DELETE BAR (multi-select) */
#del-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:600;
  padding:14px 20px;
  padding-bottom:calc(14px + env(safe-area-inset-bottom,0px));
  background:var(--menu-bg);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-top:1px solid var(--border);
  display:none;align-items:center;justify-content:space-between;
  gap:12px;
  animation:slideup 0.22s cubic-bezier(.2,1.4,.4,1);
}
#del-bar.on{display:flex}
.del-count{font-size:14px;font-weight:500;color:var(--text)}
.del-actions{display:flex;gap:10px}
.del-cancel{
  padding:8px 16px;border-radius:20px;font-size:13px;
  background:var(--glass2);border:1px solid var(--border);
  color:var(--text2);cursor:pointer;font-family:'Geist',sans-serif;
}
.del-confirm{
  padding:8px 16px;border-radius:20px;font-size:13px;font-weight:500;
  background:rgba(220,50,50,0.15);border:1px solid rgba(220,50,50,0.3);
  color:#e03535;cursor:pointer;font-family:'Geist',sans-serif;
  display:flex;align-items:center;gap:6px;
}


/* LIGHTBOX */
#lb{position:fixed;inset:0;background:rgba(0,0,0,0.93);z-index:800;display:none;align-items:center;justify-content:center;backdrop-filter:blur(5px)}
#lb.on{display:flex}
#lb img{max-width:95vw;max-height:90vh;border-radius:10px;object-fit:contain}
#lbx{position:absolute;top:18px;right:18px;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);color:white;width:38px;height:38px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(12px)}

/* TOAST */
#toast{
  position:fixed;bottom:84px;left:50%;
  transform:translateX(-50%) translateY(8px);
  background:var(--menu-bg);backdrop-filter:blur(20px);
  border:1px solid var(--border);padding:9px 20px;border-radius:22px;
  font-size:13px;color:var(--text2);opacity:0;transition:all 0.22s;
  z-index:900;white-space:nowrap;pointer-events:none;
  box-shadow:0 4px 20px var(--shadow);
}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* LOADER */
#ldr{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;align-items:center;justify-content:center;transition:opacity 0.4s}
#ldr.off{opacity:0;pointer-events:none}
.ldots{display:flex;gap:9px}
.ldots span{width:9px;height:9px;border-radius:50%;background:var(--accent);animation:ldp 1.3s ease infinite}
.ldots span:nth-child(2){animation-delay:0.18s;background:rgba(var(--accent-rgb),0.7)}
.ldots span:nth-child(3){animation-delay:0.36s;background:rgba(var(--accent-rgb),0.45)}
@keyframes ldp{0%,80%,100%{transform:scale(0.55);opacity:0.3}40%{transform:scale(1);opacity:1}}
</style>
</head>
<body>

<!-- BG -->
<div class="bg-wrap">
  <div class="bg-base"></div>
  <div class="bg-orbs"></div>
  <div class="bg-photo" id="bgphoto"></div>
  <div class="bg-scrim"></div>
  <div class="bg-dark-overlay"></div>
</div>

<!-- LOADER -->
<div id="ldr"><div class="ldots"><span></span><span></span><span></span></div></div>

<!-- SETUP -->
<div id="setup" class="screen off">
  <div class="setup-inner">
    <div class="logo"><h1>us.</h1><p>just the two of you</p></div>
    <div class="user-cards">
      <div class="ucard" onclick="pick('Satyam')">
        <div class="uav">S</div>
        <div class="uinfo"><h3>Satyam</h3><p>that's me</p></div>
        <span class="uarr">›</span>
      </div>
      <div class="ucard" onclick="pick('Snks')">
        <div class="uav">S</div>
        <div class="uinfo"><h3>Snks</h3><p>that's her</p></div>
        <span class="uarr">›</span>
      </div>
    </div>
  </div>
</div>

<!-- CHAT -->
<div id="chat" class="screen off">
  <div class="hdr">
    <div class="hdr-av" id="hdrav"></div>
    <div class="hdr-info">
      <div class="hdr-name" id="hdrname"></div>
      <div class="hdr-st" id="hdrst">
        <span class="st-dot" id="stdot"></span>
        <span id="sttxt">—</span>
      </div>
    </div>
    <div class="hdr-btn" onclick="openMenu()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </div>
  </div>

  <div class="msgs" id="msgs">
    <div class="empty" id="empty">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" style="opacity:0.3"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <p>say something first</p>
    </div>
  </div>

  <div id="iprv">
    <img id="prvimg" src="" alt=""/>
    <button onclick="clearImg()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>

  <div id="rbar">
    <div class="rb-in">
      <div class="rb-lbl">Replying to</div>
      <div class="rb-txt" id="rbtxt">—</div>
    </div>
    <button class="rb-x" onclick="clearReply()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>

  <div class="inputrow">
    <label class="attbtn" for="ifile">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
    </label>
    <input type="file" id="ifile" accept="image/*" style="display:none" onchange="handleImg(event)"/>
    <div class="inpwrap">
      <textarea id="minp" placeholder="message..." rows="1" oninput="onInp(this)" onkeydown="onKey(event)"></textarea>

// ── BACKGROUND ──
async function uploadBg(e){
  const file=e.target.files[0];
  if(!file){return;}
  e.target.value='';
  if(file.size>8*1024*1024){toast('Max 8MB');return;}
  toast('Uploading wallpaper...');
  // Always upload to same fixed path so it overwrites previous bg
  const ext=file.name.split('.').pop()||'jpg';
  const path=`wallpaper/bg.${ext}`;
  // upsert:true overwrites existing file
  const{error:upErr}=await sb.storage.from('images').upload(path,file,{upsert:true,contentType:file.type});
  if(upErr){
    // fallback: store as data URL for small images
    if(file.size<=2*1024*1024){
      const reader=new FileReader();
      reader.onload=async ev=>{
        const{error}=await sb.from('settings').upsert({key:'background',value:ev.target.result},{onConflict:'key'});
        if(error)toast('Upload failed');
        else{applyBgUrl(ev.target.result);toast('Wallpaper set ✓');}
      };
      reader.readAsDataURL(file);
    } else {
      toast('Upload failed — try a smaller image');
    }
    return;
  }
  // get public URL with cache-busting
  const{data:urlData}=sb.storage.from('images').getPublicUrl(path);
  const url=urlData.publicUrl+'?t='+Date.now();
  const{error:dbErr}=await sb.from('settings').upsert({key:'background',value:url},{onConflict:'key'});
  if(dbErr){toast('DB save failed');return;}
  applyBgUrl(url);
  toast('Wallpaper updated ✓');
}

function applyBgUrl(url){
  const el=document.getElementById('bgphoto');
  const pw=document.getElementById('bgprvwrap');
  const pi=document.getElementById('bgprvimg');
  if(!url){
    el.classList.remove('show');el.style.backgroundImage='';
    pw.style.display='none';return;
  }
  el.style.backgroundImage=`url('${url}')`;
  el.classList.add('show');
  pi.src=url;
  pw.style.display='block';
}

}

function mkEl(msg){
  const me=msg.sender===CU;
  const w=document.createElement('div');
  w.className=`mw ${me?'me':'her'}`;
  w.dataset.id=msg.id;

  // Reply preview (above bubble)
  if(msg.reply_to){
    const orig=msgs.find(m=>m.id===msg.reply_to);
    if(orig){
      const rp=document.createElement('div');
      rp.className='rprev';
      rp.textContent=orig.deleted?'🚫 deleted message':(orig.content||'📷 Photo');
      w.appendChild(rp);
    }
  }

  // Bubble wrapper (slides on swipe)
  const bw=document.createElement('div');
  bw.className='bbl-wrap';

  // Swipe arrow
  const arrow=document.createElement('div');
  arrow.className='swipe-arrow';
  arrow.textContent='↩';
  bw.appendChild(arrow);

  const b=document.createElement('div');b.className='bbl';

  if(msg.deleted){
    b.classList.add('deleted');
    b.textContent='this message was deleted';
  } else if(msg.voice&&msg.image_url){
    // voice message
    const durMatch=(msg.content||'').match(/\[voice:(\d+)\]/);
    const dur=durMatch?parseInt(durMatch[1]):0;
    renderVoice(msg.image_url,dur,b);
  } else if(msg.image_url){
    const img=document.createElement('img');
    img.src=msg.image_url;img.loading='lazy';
    img.onclick=ev=>{ev.stopPropagation();openLB(msg.image_url);};
    b.appendChild(img);
    if(msg.content){
      const t=document.createElement('div');t.style.marginTop='7px';
      renderContent(msg.content,t);
      b.appendChild(t);
    }
  } else if(msg.content){
    renderContent(msg.content,b);
  }

  if(!msg.deleted){
    b.addEventListener('click',ev=>{
      if(selectMode){toggleSelect(msg.id);return;}
      openCtx(ev,msg.id);
    });
  }
  // prevent browser long-press context menu on mobile
  b.addEventListener('contextmenu',e=>e.preventDefault());

  // Long press = enter multi-select
  let lpTimer;
  bw.addEventListener('touchstart',()=>{
    lpTimer=setTimeout(()=>{
      if(!selectMode) enterSelectMode(msg.id);
      else toggleSelect(msg.id);
    },500);
  },{passive:true});
  bw.addEventListener('touchend',()=>clearTimeout(lpTimer),{passive:true});
  bw.addEventListener('touchmove',()=>clearTimeout(lpTimer),{passive:true});

  bw.appendChild(b);
  w.appendChild(bw);

  // Reactions
  if(!msg.deleted){
    const rx=msg.reactions||{};
    if(Object.keys(rx).length){
      const row=document.createElement('div');row.className='rxrow';
      for(const[em,cnt] of Object.entries(rx)){
        const c=document.createElement('div');c.className='rxchip';c.textContent=`${em} ${cnt}`;
        row.appendChild(c);
      }
      w.appendChild(row);
    }
  }

  // Meta row
  const meta=document.createElement('div');meta.className='mmeta';
  const t=document.createElement('span');t.className='mtime';
  t.textContent=new Date(msg.created_at).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true});
  meta.appendChild(t);
  if(me&&!msg.deleted){
    const tk=document.createElement('span');
    tk.className='ticks'+(msg.seen?' seen':'');
    tk.textContent=msg.seen?'✓✓':'✓';
    meta.appendChild(tk);
  }
  w.appendChild(meta);

  // Swipe to reply
  if(!msg.deleted) addSwipe(bw,arrow,msg);
  return w;
}

function addSwipe(bw,arrow,msg){
  let startX=0,startY=0,dx=0,swiping=false,fired=false,dir=0;
  const THRESHOLD=58;

  bw.addEventListener('touchstart',e=>{
    startX=e.touches[0].clientX;
    startY=e.touches[0].clientY;
    dx=0;swiping=true;fired=false;dir=0;
  },{passive:true});

  bw.addEventListener('touchmove',e=>{
    if(!swiping)return;
    dx=e.touches[0].clientX-startX;
    const dy=Math.abs(e.touches[0].clientY-startY);
    if(dy>Math.abs(dx)){swiping=false;bw.style.transform='';arrow.style.opacity='';return;}

    if(dir===0) dir=dx>0?1:-1;
    const clamped=Math.max(-THRESHOLD*1.2,Math.min(dx,THRESHOLD*1.2));
    bw.style.transform=`translateX(${clamped}px)`;

    if(dir===1){
      // right swipe = reply arrow
      const progress=Math.min(dx/THRESHOLD,1);
      arrow.style.opacity=String(Math.max(0,progress));
      if(dx>=THRESHOLD&&!fired){fired=true;if(navigator.vibrate)navigator.vibrate(18);}
    } else {
      // left swipe = action tray fades in from right
      arrow.style.opacity='0';
      if(dx<=-THRESHOLD&&!fired){fired=true;if(navigator.vibrate)navigator.vibrate(18);}
    }
  },{passive:true});

  const endSwipe=()=>{
    if(!swiping)return;
    swiping=false;
    bw.style.transition='transform 0.2s cubic-bezier(.2,1.4,.4,1)';
    bw.style.transform='';
    arrow.classList.remove('show');
    arrow.style.opacity='';
    setTimeout(()=>bw.style.transition='',220);
    if(fired){
      if(dir===1){
        // right swipe = reply
        setReply(msg);
      } else {
        // left swipe = open ctx menu centered on this bubble
        const rect=bw.getBoundingClientRect();
        const fakeEv={preventDefault:()=>{},clientX:rect.right-10,clientY:rect.top+rect.height/2};
        openCtx(fakeEv,msg.id);
      }
    }
  };

  bw.addEventListener('touchend',endSwipe,{passive:true});
  bw.addEventListener('touchcancel',endSwipe,{passive:true});
}

function enterSelectMode(id){

function toggleSelect(id){
  if(!selectMode)return;
  const el=document.querySelector(`.mw[data-id="${id}"]`);
  if(selectedIds.has(id)){
    selectedIds.delete(id);
    el?.classList.remove('selected');
  } else {
    selectedIds.add(id);
    el?.classList.add('selected');
  }
  if(selectedIds.size===0){cancelSelect();return;}
  updateDelBar();
}

function updateDelBar(){
  document.getElementById('del-count').textContent=`${selectedIds.size} selected`;
}

function cancelSelect(){
  selectMode=false;selectedIds.clear();
  document.getElementById('msgs').classList.remove('selecting');
  document.getElementById('del-bar').classList.remove('on');
  document.querySelectorAll('.mw.selected').forEach(e=>e.classList.remove('selected'));

async function deleteSelected(){
  const ids=[...selectedIds].filter(id=>{
    const msg=msgs.find(m=>m.id===id);
    return msg&&msg.sender===CU&&!msg.deleted;
  });
  if(!ids.length){toast("Can only delete your own messages");cancelSelect();return;}
  const other=selectedIds.size-ids.length;
  if(other>0) toast(`Skipped ${other} message(s) you didn't send`);
  // soft delete all at once
  const{error}=await sb.from('messages')
    .update({deleted:true,content:null,image_url:null,reactions:{}})
    .in('id',ids);
  if(error) toast('Delete failed');
  cancelSelect();
}

function subMsgs(){
  if(msgCh){try{sb.removeChannel(msgCh);}catch(e){}}
  msgCh=sb.channel(`msgs-${Date.now()}`)
    .on('postgres_changes',{event:'*',schema:'public',table:'messages'},p=>{
      if(p.eventType==='INSERT'){
        if(msgs.find(m=>m.id===p.new.id))return;
        msgs.push(p.new);
        document.getElementById('empty').style.display='none';
        document.getElementById('msgs').appendChild(mkEl(p.new));
        scrollBot(true);
        if(p.new.sender!==CU){
          if(document.visibilityState==='visible')markSeen();
          pushNotif(p.new);
        }
      } else if(p.eventType==='UPDATE'){
        const i=msgs.findIndex(m=>m.id===p.new.id);
        if(i!==-1)msgs[i]=p.new;
        const el=document.querySelector(`.mw[data-id="${p.new.id}"]`);
        if(el)el.replaceWith(mkEl(p.new));
      } else if(p.eventType==='DELETE'){
        const i=msgs.findIndex(m=>m.id===p.old.id);
        if(i!==-1){msgs[i]={...msgs[i],deleted:true};}
        const el=document.querySelector(`.mw[data-id="${p.old.id}"]`);
        if(el&&msgs[i]) el.replaceWith(mkEl(msgs[i]));
      }
    })
    .subscribe(async status=>{
      if(status==='CLOSED'||status==='CHANNEL_ERROR'){
        // Silently fetch only missed messages since last known, no full re-render
        await catchupMsgs();
        setTimeout(subMsgs, 3000);
      }
    });
}

// Fetch only messages newer than what we have — no flicker
async function catchupMsgs(){
  const lastTs=msgs.length?msgs[msgs.length-1].created_at:new Date(0).toISOString();
  const{data}=await sb.from('messages').select('*')
    .gt('created_at',lastTs)
    .order('created_at',{ascending:true});
  if(!data||!data.length)return;
  const area=document.getElementById('msgs');
  data.forEach(m=>{
    if(msgs.find(x=>x.id===m.id))return;
    msgs.push(m);
    document.getElementById('empty').style.display='none';
    area.appendChild(mkEl(m));
  });
  if(data.length) scrollBot(true);
}

let typT2;

function broadcastTyp(){

}

// ── SEND ──
let typTmr;
async function send(){
  const inp=document.getElementById('minp');
  const txt=inp.value.trim();
  if(!txt&&!pendingImg)return;
  let imgUrl=null;
  if(pendingImg){
    const ext=pendingImg.name.split('.').pop()||'jpg';
    const path=`chat_${Date.now()}.${ext}`;
    const{error}=await sb.storage.from('images').upload(path,pendingImg);
    if(error){toast('Image upload failed');return;}
    imgUrl=sb.storage.from('images').getPublicUrl(path).data.publicUrl;
    clearImg();
  }
  inp.value='';inp.style.height='auto';
  document.getElementById('sndbtn').classList.remove('on');
  const{error}=await sb.from('messages').insert({
    sender:CU,content:txt||null,image_url:imgUrl,
    reply_to:replyTo?.id||null,seen:false,reactions:{}
  });
  if(error)toast('Send failed');
  clearReply();
}

async function markSeen(){
  if(!OU)return;
  await sb.from('messages').update({seen:true}).eq('sender',OU).eq('seen',false);
}

// ── INPUT ──
function onInp(el){

function onKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}

// ── IMAGE ATTACH ──
function handleImg(e){

function clearImg(){

function closeMenu(){document.getElementById('mpanel').classList.remove('on');document.getElementById('overlay').classList.remove('on');}

// ── CTX ──
function openCtx(e,id){

  const m=document.getElementById('ctx');
  m.classList.add('on');document.getElementById('overlay').classList.add('on');

function closeCtx(){
  document.getElementById('ctx').classList.remove('on');
  document.getElementById('rxnpick').classList.remove('on');
  document.getElementById('overlay').classList.remove('on');
  ctxId=null;
}
function closeAll(){
  closeMenu();closeCtx();
  if(selectMode) cancelSelect();
}
function ctxReply(){const m=msgs.find(m=>m.id===ctxId);if(m)setReply(m);closeCtx();}
function ctxCopy(){
  const msg=msgs.find(m=>m.id===ctxId);
  if(!msg||msg.deleted){closeCtx();return;}
  const txt=msg.content||'';
  if(navigator.clipboard){navigator.clipboard.writeText(txt).then(()=>toast('Copied'));}
  else{const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('Copied');}
  closeCtx();
}
function ctxReact(){
  const menu=document.getElementById('ctx'),pick=document.getElementById('rxnpick');
  pick.classList.add('on');
  // Calculate safe position — never go off right edge or top
  const pickW=Math.min(280, window.innerWidth-24); // 6 emojis * ~44px + padding
  const menuLeft=parseInt(menu.style.left)||0;
  const menuTop=parseInt(menu.style.top)||0;
  const safeLeft=Math.max(12, Math.min(menuLeft, window.innerWidth-pickW-12));
  const safeTop=Math.max(12, menuTop-60);
  pick.style.left=safeLeft+'px';
  pick.style.top=safeTop+'px';
  menu.classList.remove('on');
}
async function addRxn(em){
  const msg=msgs.find(m=>m.id===ctxId);if(!msg)return;
  const rx={...(msg.reactions||{})};rx[em]=(rx[em]||0)+1;
  await sb.from('messages').update({reactions:rx}).eq('id',msg.id);
  closeCtx();
}
async function ctxDel(){
  const msg=msgs.find(m=>m.id===ctxId);
  if(!msg||msg.sender!==CU){toast("Can't delete their message");closeCtx();return;}
  const{error}=await sb.from('messages').update({deleted:true,content:null,image_url:null,reactions:{}}).eq('id',ctxId);
  if(error)toast('Delete failed');
  closeCtx();
}

// ── LINK DETECTION ──
const URL_RE=/https?:\/\/[^\s<>"']+/gi;
function hasLink(txt){return txt&&URL_RE.test(txt);}
function renderContent(txt,bubble){
  if(!txt){return;}
  URL_RE.lastIndex=0;
  let last=0,match;
  const frag=document.createDocumentFragment();
  while((match=URL_RE.exec(txt))!==null){
    if(match.index>last){
      frag.appendChild(document.createTextNode(txt.slice(last,match.index)));
    }
    const a=document.createElement('a');
    a.href=match[0];a.textContent=match[0];
    a.target='_blank';a.rel='noopener noreferrer';
    // prevent long-press selection but allow click/tap
    a.addEventListener('click',e=>{e.stopPropagation();window.open(match[0],'_blank');});
    frag.appendChild(a);
    last=match.index+match[0].length;
    // attach link preview card for first link only
    if(URL_RE.lastIndex>0) break; // only first link preview
  }
  if(last<txt.length) frag.appendChild(document.createTextNode(txt.slice(last)));
  bubble.appendChild(frag);

  // Link preview card
  URL_RE.lastIndex=0;
  const firstUrl=URL_RE.exec(txt);
  if(firstUrl) attachLinkPreview(bubble,firstUrl[0]);
}

function attachLinkPreview(bubble,url){
  const card=document.createElement('div');
  card.className='link-card';
  card.innerHTML=`<div class="link-card-placeholder"><span class="lp-icon">🔗</span><span class="lp-url">${url}</span></div>`;
  card.onclick=e=>{e.stopPropagation();window.open(url,'_blank');};
  bubble.appendChild(card);
  // Try to fetch OG data via a free proxy
  fetchOG(url).then(og=>{
    if(!og)return;
    let inner='';
    if(og.image) inner+=`<img class="link-card-img" src="${og.image}" alt="" loading="lazy" onerror="this.style.display='none'"/>`;
    inner+=`<div class="link-card-body"><div class="link-card-title">${og.title||url}</div><div class="link-card-url">${new URL(url).hostname}</div></div>`;
    card.innerHTML=inner;
    card.onclick=e=>{e.stopPropagation();window.open(url,'_blank');};
  }).catch(()=>{});
}

async function fetchOG(url){
  try{
    // Use allorigins as a CORS proxy to fetch OG tags
    const proxy=`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
    const r=await fetch(proxy,{signal:AbortSignal.timeout(5000)});
    const j=await r.json();
    const html=j.contents||'';
    const ogTitle=html.match(/<meta[^>]*property=["']og:title["'][^>]*content=["']([^"']+)["']/i)?.[1]
      ||html.match(/<title[^>]*>([^<]+)<\/title>/i)?.[1]||'';
    const ogImage=html.match(/<meta[^>]*property=["']og:image["'][^>]*content=["']([^"']+)["']/i)?.[1]||'';
    return{title:ogTitle.trim().slice(0,80),image:ogImage};
  }catch{return null;}
}

// ── VOICE MESSAGES ──
let mediaRec=null,audioChunks=[],recStart=0,recTimer=null;

async function startRec(){
  if(mediaRec&&mediaRec.state==='recording')return;
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    audioChunks=[];
    mediaRec=new MediaRecorder(stream,{mimeType:getSupportedMime()});
    mediaRec.ondataavailable=e=>{if(e.data.size>0)audioChunks.push(e.data);};
    mediaRec.onstop=async()=>{
      stream.getTracks().forEach(t=>t.stop());
      if(audioChunks.length===0)return;
      const blob=new Blob(audioChunks,{type:mediaRec.mimeType});
      const dur=Math.round((Date.now()-recStart)/1000);
      await sendVoice(blob,dur);
    };
    mediaRec.start(100);
    recStart=Date.now();
    document.getElementById('recbtn').classList.add('recording');
    // max 60s auto stop
    recTimer=setTimeout(()=>stopRec(),60000);
    if(navigator.vibrate) navigator.vibrate(20);
  } catch(e){
    toast('Microphone access denied');
  }
}

function stopRec(){
  clearTimeout(recTimer);
  document.getElementById('recbtn').classList.remove('recording');
  if(mediaRec&&mediaRec.state==='recording'){
    mediaRec.stop();
  }
}

function getSupportedMime(){
  const types=['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/mp4'];
  return types.find(t=>MediaRecorder.isTypeSupported(t))||'audio/webm';
}

async function sendVoice(blob,dur){
  toast('Sending voice...');
  const ext=blob.type.includes('ogg')?'ogg':blob.type.includes('mp4')?'m4a':'webm';
  const path=`voice_${Date.now()}.${ext}`;
  const{error}=await sb.storage.from('images').upload(path,blob,{contentType:blob.type});
  if(error){toast('Voice upload failed');return;}
  const url=sb.storage.from('images').getPublicUrl(path).data.publicUrl;
  await sb.from('messages').insert({
    sender:CU,content:`[voice:${dur}]`,image_url:url,
    reply_to:replyTo?.id||null,seen:false,reactions:{},voice:true
  });
  clearReply();
}

// Render voice message inside bubble
function renderVoice(url,dur,bubble){
  bubble.innerHTML='';
  const wrap=document.createElement('div');wrap.className='voice-msg';
  const btn=document.createElement('button');btn.className='voice-play';btn.textContent='▶';
  const canvas=document.createElement('canvas');
  canvas.width=120;canvas.height=28;
  const wf=document.createElement('div');wf.className='voice-waveform';wf.appendChild(canvas);
  const durEl=document.createElement('span');durEl.className='voice-dur';
  durEl.textContent=formatDur(dur);
  wrap.append(btn,wf,durEl);
  bubble.appendChild(wrap);

  // Draw static waveform bars (decorative)
  drawWaveform(canvas);

  let audio=null,playing=false,interval=null;
  btn.onclick=e=>{
    e.stopPropagation();
    if(!audio){audio=new Audio(url);audio.onended=()=>{playing=false;btn.textContent='▶';clearInterval(interval);durEl.textContent=formatDur(dur);};}
    if(playing){audio.pause();audio.currentTime=0;playing=false;btn.textContent='▶';clearInterval(interval);durEl.textContent=formatDur(dur);}
    else{audio.play();playing=true;btn.textContent='⏹';
      interval=setInterval(()=>{
        const rem=dur-Math.floor(audio.currentTime);
        durEl.textContent=formatDur(Math.max(0,rem));
      },500);
    }
  };
}

function drawWaveform(canvas){
  const ctx=canvas.getContext('2d');
  const w=canvas.width,h=canvas.height;
  const bars=28;const bw=3;const gap=1;
  ctx.clearRect(0,0,w,h);
  for(let i=0;i<bars;i++){
    const bh=4+Math.random()*(h-8);
    const x=i*(bw+gap);const y=(h-bh)/2;
    ctx.fillStyle='rgba(var(--accent-rgb,184,96,112),0.5)';
    ctx.beginPath();ctx.roundRect(x,y,bw,bh,2);ctx.fill();
  }
}

function formatDur(s){
  const m=Math.floor(s/60);const sec=s%60;
  return`${m}:${String(sec).padStart(2,'0')}`;
}

function closeLB(){document.getElementById('lb').classList.remove('on');}

function pushNotif(msg){
  if(document.visibilityState==='visible')return;
  if(!('Notification'in window)||Notification.permission!=='granted')return;
  new Notification(msg.sender,{body:msg.image_url?'📷 sent a photo':msg.content});

function toast(t){
  const el=document.getElementById('toast');
  el.textContent=t;el.classList.add('on');
  clearTimeout(toast._t);toast._t=setTimeout(()=>el.classList.remove('on'),2800);
}

// ── SW (auto-update) ──
if('serviceWorker'in navigator){
  navigator.serviceWorker.register('sw.js').then(reg=>{
    setInterval(()=>reg.update(),300000);
    reg.addEventListener('updatefound',()=>{
      const nw=reg.installing;
      nw.addEventListener('statechange',()=>{
        if(nw.state==='installed'&&navigator.serviceWorker.controller)
          nw.postMessage({type:'SKIP_WAITING'});
      });
    });
  }).catch(()=>{});
  navigator.serviceWorker.addEventListener('controllerchange',()=>window.location.reload());
}
